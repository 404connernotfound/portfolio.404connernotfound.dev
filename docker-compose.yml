name: portfolio

x-app-image: &app-image
  image: portfolio-website:latest
  build:
    context: .
    dockerfile: Dockerfile

x-app-env: &app-env
  env_file:
    - ${PORTFOLIO_ENV_FILE:-./deploy/portfolio.env}

services:
  app:
    <<: [*app-image, *app-env]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${HOST_APP_PORT:-3000}:3000"
      - "127.0.0.1:${HOST_PLAYGROUND_WS_PORT:-24680}:${PLAYGROUND_WS_PORT:-24680}"
    volumes:
      - portfolio_sqlite_data:/data
      - portfolio_uploads:/app/static/uploads
      - portfolio_asset_uploads:/app/static/assets/uploads
      - portfolio_work_assets:/app/static/assets/work
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  migrate:
    <<: [*app-image, *app-env]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - portfolio_sqlite_data:/data
      - portfolio_uploads:/app/static/uploads
      - portfolio_asset_uploads:/app/static/assets/uploads
      - portfolio_work_assets:/app/static/assets/work
    command: ["npm", "run", "db:seed"]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in deploy/portfolio.env}
    volumes:
      - portfolio_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - portfolio_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8

volumes:
  portfolio_pg_data:
  portfolio_redis_data:
  portfolio_sqlite_data:
  portfolio_uploads:
  portfolio_asset_uploads:
  portfolio_work_assets:
